<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Visor de Programas FANUC</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #programList { margin-top: 20px; }
    .program { margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; }
    .program pre { background: #f8f8f8; padding: 10px; white-space: pre-wrap; }
    .program-header { font-weight: bold; margin-bottom: 5px; }
    .hidden { display: none; }
    input[type="text"] { margin-bottom: 10px; padding: 5px; width: 100%; }
  </style>
</head>
<body>
<h2>Visor de Programas de Torno FANUC</h2>
<input type="file" id="fileInput" accept=".ALL,.txt,.nc" /><br><br>
<input type="text" id="searchBox" placeholder="Buscar por número de programa (ej: O1234)" />
<input type="button" id="Exp_Comp" value="E/C" alt="Expandir / Comprimir todos los programas"  />
<div id="programList"></div>
<script>
  let allPrograms = [];
  // al hacer clic en E/C
  $("#Exp_Comp").on("click", function() {
    const isAnyHidden = $(".program pre.hidden").length > 0;
    $(".program pre").each(function() {
      if (isAnyHidden) {
        $(this).removeClass("hidden");
      } else {
        $(this).addClass("hidden");
      }
    });
  });
  function parsePrograms(content) {
    const lines = content.replace(/\r/g, '').split('\n');
    const programs = [];
    let current = [];
    let insideProgram = false;
    for (let line of lines) {
      line = line.trim();
      if (line.match(/^O\d{1,4}/)) {
        if (current.length > 0) programs.push(current.join('\n'));
        current = [line];
        insideProgram = true;
      } else if (insideProgram) {
        current.push(line);
        if (line.includes('M30')) {
          programs.push(current.join('\n'));
          current = [];
          insideProgram = false;
        }
      }
    }
    if (current.length > 0) programs.push(current.join('\n'));
    return programs;
  }
  function displayPrograms(programs) {
    $("#programList").empty();
    programs.forEach((prog, index) => {
      const oMatch = prog.match(/^O\d{1,4}/m);
      const commentMatch = prog.match(/^O\d{1,4}\((.*?)\)/m);
      const progNumber = oMatch?.[0] || `Programa ${index + 1}`;
      const comment = commentMatch?.[1]?.trim();
      const filename = comment ? `${progNumber} - ${comment}` : progNumber;
      // agrego cantidad de bites al nombre del archivo
      const byteCount = prog.length;
      const filenameWithBytes = `${filename} (${byteCount} bytes)`; 
      const progId = `prog_${index}`;

      $("#programList").append(`
        <div class="program" data-prog="${progNumber.toUpperCase()}">
          <div class="program-header">
            ${filenameWithBytes}
            <button onclick="$('#${progId}').toggle()">Ver/Ocultar</button>
            <button onclick="downloadProgram(\`${sanitizeFilename(filename)}\`, \`${prog.replace(/`/g, "\\`")}\`)">Descargar</button>
          </div>
          <pre id="${progId}" class="hidden">${prog}</pre>
        </div>
      `);
    });
  }
  function downloadProgram(name, content) {
    const blob = new Blob([content], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = name + ".nc";
    a.click();
    URL.revokeObjectURL(url);
  }
  function sanitizeFilename(name) {
    return name.replace(/[\\/:*?"<>|]/g, '_');
  }
  $("#fileInput").on("change", function (e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (event) {
      const content = event.target.result;
      allPrograms = parsePrograms(content);
      displayPrograms(allPrograms);
    };
    reader.readAsText(file);
  });
  $("#searchBox").on("input", function () {
    const term = $(this).val().toUpperCase();
    $(".program").each(function () {
      const progNum = $(this).data("prog");
      $(this).toggle(progNum.includes(term));
    });
  });
</script>

</body>
</html>
